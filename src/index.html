        "name": "Was ist ein Altersvorsorgedepot (AVD) und wie funktioniert die Optimierung?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Das Altersvorsorgedepot (AVD) ist ein staatlich gefördertes Investmentkonto für die private Altersvorsorge nach §10a EStG ab 2027. Der Staat gewährt eine Grundzulage von bis zu 540 € pro Jahr sowie eine Kinderzulage von 300 € pro Kind. Die Altersvorsorgedepot-Optimierung ermittelt, wie viel Eigenanteil ins AVD fließen sollte, damit die staatliche Förderung die niedrigere Rendite und die nachgelagerte Besteuerung überwiegt."
        }
      },
      {
        "@type": "Question",
        "name": "Was ist eine Rentenlücke?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Die Rentenlücke ist die monatliche Differenz zwischen dem aktuellen Nettoeinkommen und der zu erwartenden gesetzlichen Nettorente. Sie zeigt, wie viel Geld im Alter zusätzlich benötigt wird, um den gewohnten Lebensstandard aufrechtzuerhalten."
        }
      },
      {
        "@type": "Question",
        "name": "Wie viel Kapital benötige ich für die Altersvorsorge?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Der Kapitalbedarf ergibt sich aus der monatlichen Rentenlücke und der 4-Prozent-Regel: Kapitalbedarf = monatliche Lücke × 12 ÷ 0,04. Eine monatliche Lücke von 1.000 € erfordert demnach rund 300.000 € angespartes Kapital."
        }
      },
      {
        "@type": "Question",
        "name": "ETF-Sparplan oder Altersvorsorgedepot – was ist besser?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Das hängt vom individuellen Grenzsteuersatz ab. Wer wenig verdient, profitiert stärker von der Zulage des AVD. Wer viel verdient, kann durch den Steuerabzug beim AVD (Günstigerprüfung) mehr gewinnen als die Zulage wert ist. Dieser Altersvorsorgerechner berechnet die optimale Aufteilung zwischen ETF und Altersvorsorgedepot für die eigene Situation."
        }
      }
