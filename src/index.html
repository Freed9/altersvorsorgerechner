        "name": "Was ist eine Rentenlücke?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Die Rentenlücke ist die monatliche Differenz zwischen dem aktuellen Nettoeinkommen und der zu erwartenden gesetzlichen Nettorente. Sie zeigt, wie viel Geld im Alter zusätzlich benötigt wird, um den gewohnten Lebensstandard aufrechtzuerhalten."
        }

        "@type": "Question",
        "name": "Wie viel Kapital benötige ich für die Altersvorsorge?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Der Kapitalbedarf ergibt sich aus der monatlichen Rentenlücke und der 4-Prozent-Regel: Kapitalbedarf = monatliche Lücke × 12 ÷ 0,04. Eine monatliche Lücke von 1.000 € erfordert demnach rund 300.000 € angespartes Kapital."
        }
      },
      {
        "@type": "Question",
        "name": "Was ist ein Altersvorsorgedepot (AVD)?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Das Altersvorsorgedepot (AVD) ist ein staatlich gefördertes Investmentkonto für die private Altersvorsorge nach §10a EStG. Der Staat gewährt eine Grundzulage von bis zu 540 € pro Jahr sowie eine Kinderzulage von 300 € pro Kind. Zusätzlich können Beiträge (Eigenanteil + Zulage) als Sonderausgaben steuerlich abgesetzt werden."
        }
      },
      {
        "@type": "Question",
        "name": "Was ist die 4-Prozent-Regel?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Die 4-Prozent-Regel besagt, dass man jährlich 4 % seines angesparten Kapitals entnehmen kann, ohne es statistisch zu erschöpfen. Sie basiert auf historischen Marktrenditen über lange Zeiträume und gilt als Faustformel für die Entnahmephase im Ruhestand."
        }
      },
      {
        "@type": "Question",
        "name": "ETF-Sparplan oder Altersvorsorgedepot – was ist besser?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Das hängt vom individuellen Grenzsteuersatz ab. Wer wenig verdient, profitiert stärker von der Zulage des AVD. Wer viel verdient, kann durch den Steuerabzug beim AVD (Günstigerprüfung) mehr gewinnen als die Zulage wert ist. Dieser Rechner berechnet das optimale Verhältnis zwischen ETF und AVD für die eigene Situation."
        }
      },
      {
        "@type": "Question",
        "name": "Wie berechne ich die optimale Aufteilung zwischen Altersvorsorgedepot und ETF-Sparplan?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Der Rechner ermittelt automatisch die optimale Aufteilung zwischen staatlichem Altersvorsorgedepot (AVD) und freiem ETF-Sparplan. Dazu wird für jeden möglichen AVD-Eigenanteil die Netto-Rendite unter Berücksichtigung von Zulagen, Günstigerprüfung und nachgelagerter Besteuerung berechnet. Das Optimum liegt meist beim Mindestbeitrag für die volle Zulage – besonders bei vielen Kindern oder niedrigem Grenzsteuersatz."
        }
      }
    ]
